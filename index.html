<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birinchi Saytim</title>
    <style>
        /* Bu qism saytning dizayni (CSS) uchun */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #4A90E2;
            color: white;
            padding: 60px 20px;
        }
        section {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4A90E2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #357ABD;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Xush kelibsiz!</h1>
        <p>Bu mening dunyodagi <strong>birinchi saytim</strong>.</p>
    </header>

    <section>
        <h2>Men haqimda</h2>
        <p>Salom!Mening ismim Akhror Ismatullayev. Men endigina dasturlashni o'rganishni boshladim. Bu sayt orqali o'z mahoratimni oshirib boraman.</p>
        <br>
        <a href="#" class="btn">Ko'proq ma'lumot</a>
    </section>

    <footer>
        <p>&copy; 2026 Birinchi Saytim. Barcha huquqlar himoyalangan.</p>
    </footer>

</body>
</html>
